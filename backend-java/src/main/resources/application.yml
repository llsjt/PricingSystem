server:
  port: 8080

spring:
  application:
    name: pricing-backend
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/pricing_system2.0?useUnicode=true&characterEncoding=utf-8&allowMultiQueries=true&useSSL=false&serverTimezone=GMT%2b8&allowPublicKeyRetrieval=true
    username: root
    password: '123456'  # 请根据实际环境修改

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl # 开发环境开启 SQL 日志

logging:
  level:
    com.example.pricing: DEBUG
    org.springframework: INFO

jwt:
  secret: "PricingSystem2024SecretKeyForHS256AlgorithmMustBeLongEnough"
  expiration: 86400000  # 24h in ms

agent:
  python:
    base-url: http://127.0.0.1:8000
    dispatch-path: /internal/tasks/dispatch
    internal-token: ''
