data_analysis_task:
  description: >
    输入 JSON：
    {request_json}

    仅输出 JSON，字段如下：
    sales_trend, sales_trend_score, inventory_status, inventory_health_score,
    estimated_turnover_days, demand_elasticity, recommended_action,
    recommended_discount_min, recommended_discount_max,
    recommendation_confidence, recommendation_reasons,
    thinking_process, reasoning, decision_summary。

    规则：
    - sales_trend 必须属于 [rapid_rising, rising, stable, declining, rapid_declining]
    - inventory_status 必须属于 [severe_overstock, overstock, normal, tight, shortage]
    - recommended_action 必须属于 [maintain, discount, clearance]
    - 折扣系数取值范围为 [0.5, 1.5]
    - 当 recommended_action 为 maintain 时，两个折扣值都必须是 1.0
  expected_output: >
    严格符合 DataAnalysis 输出结构的 JSON。
  agent: data_analysis_agent

market_intel_task:
  description: >
    输入 JSON：
    {request_json}

    结合上游任务上下文。
    仅输出 JSON，字段如下：
    competition_level, competition_score, price_position, price_percentile,
    min_competitor_price, max_competitor_price, avg_competitor_price, price_gap_vs_avg,
    market_suggestion, suggestion_confidence, suggestion_reasons,
    thinking_process, reasoning, decision_summary。

    规则：
    - competition_level 必须属于 [fierce, moderate, low]
    - price_position 必须属于 [premium, mid-range, budget]
    - market_suggestion 必须属于 [price_war, penetrate, discount, differentiate, premium, maintain]
  expected_output: >
    严格符合 MarketIntel 输出结构的 JSON。
  agent: market_intel_agent
  context:
    - data_analysis_task

risk_control_task:
  description: >
    输入 JSON：
    {request_json}

    结合上游任务上下文。
    仅输出 JSON，字段如下：
    current_profit_margin, profit_margin_after_discount, break_even_price,
    min_safe_price, required_min_price, current_price_compliant,
    risk_level, risk_score, allow_promotion, max_safe_discount,
    recommendation, recommendation_reasons, constraint_summary,
    warnings, veto_reason, thinking_process, reasoning, decision_summary。

    规则：
    - risk_level 必须属于 [high, medium, low]
    - recommendation 必须属于 [maintain, discount, increase]
    - 当 current_price_compliant 为 false 时，recommendation 必须是 increase，且 allow_promotion 必须为 false
  expected_output: >
    严格符合 RiskControl 输出结构的 JSON。
  agent: risk_control_agent
  context:
    - data_analysis_task
    - market_intel_task

manager_decision_task:
  description: >
    输入 JSON：
    {request_json}

    结合全部上游任务输出。
    仅输出 JSON，字段如下：
    decision, discount_rate, suggested_price, confidence,
    core_reasons, key_factors, risk_warning, contingency_plan,
    conflict_summary, thinking_process, reasoning。

    规则：
    - decision 必须属于 [maintain, discount, increase]
    - 如果风控结果禁止促销，decision 不能为 discount
  expected_output: >
    严格符合 ManagerDecision 输出结构的 JSON。
  agent: decision_manager_agent
  context:
    - data_analysis_task
    - market_intel_task
    - risk_control_task
